# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, dotfiles osd --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, dotfiles osd --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, dotfiles osd --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, dotfiles audio input-mute
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, dotfiles brightness display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, dotfiles brightness display 5%-
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, dotfiles brightness display 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, dotfiles brightness display 1%
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, dotfiles brightness keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, dotfiles brightness keyboard down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, dotfiles brightness keyboard cycle
bindld = ,XF86TouchpadToggle, Toggle touchpad, exec, dotfiles toggle touchpad
bindld = ,XF86TouchpadOn, Enable touchpad, exec, dotfiles toggle touchpad on
bindld = ,XF86TouchpadOff, Disable touchpad, exec, dotfiles toggle touchpad off

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, dotfiles osd --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, dotfiles osd --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, dotfiles brightness display +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, dotfiles brightness display 1%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, dotfiles osd --playerctl next
bindld = , XF86AudioPause, Pause, exec, dotfiles osd --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, dotfiles osd --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, dotfiles osd --playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, dotfiles audio output-switch
