general {
    lock_cmd = dotfiles system lock                         # lock screen and 1password
    before_sleep_cmd = DOTFILES_LOCK_ONLY=true dotfiles system lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && dotfiles system wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || dotfiles screensaver
}

# Lock system after 30 minutes (screensaver resets idle timer, so have to just do 27.5 minutes + 2s margin)
listener {
    timeout = 1652
    on-timeout = dotfiles system lock
    on-resume = dotfiles system wake
}
